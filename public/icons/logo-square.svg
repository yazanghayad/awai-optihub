<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#525942" rx="80"/>
  
  <!-- Abstract AI brain/wave pattern -->
  <g opacity="0.18">
    <path d="M 100 200 Q 150 150, 200 200 T 300 200 T 400 200" stroke="#FBFFED" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 100 230 Q 150 180, 200 230 T 300 230 T 400 230" stroke="#FBFFED" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="150" cy="190" r="8" fill="#FBFFED"/>
    <circle cx="250" cy="190" r="10" fill="#FBFFED"/>
    <circle cx="350" cy="190" r="8" fill="#FBFFED"/>
  </g>
  
  <!-- Main text: AWAI with creative styling -->
  <g>
    <!-- A -->
    <path d="M 120 380 L 150 300 L 180 380 M 135 350 L 165 350" stroke="#FBFFED" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- W -->
    <path d="M 200 300 L 220 380 L 240 320 L 260 380 L 280 300" stroke="#FBFFED" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- A -->
    <path d="M 300 380 L 330 300 L 360 380 M 315 350 L 345 350" stroke="#FBFFED" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- I -->
    <path d="M 385 300 L 385 380" stroke="#FBFFED" stroke-width="12" stroke-linecap="round"/>
    <circle cx="385" cy="282" r="6" fill="#FBFFED"/>
  </g>
  
  <!-- Decorative accent - AI pulse -->
  <circle cx="256" cy="420" r="4" fill="#FBFFED" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
